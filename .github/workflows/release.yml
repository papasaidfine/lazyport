name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When two tags point at the same commit (e.g. tagging v0.1.0 right
          # on top of v0.1.0-beta.N), GoReleaser's auto tag detection can pick
          # the wrong one. Pin it to whichever tag actually triggered this run.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
